<nav 
  class="fixed top-0 left-0 w-full z-[100] transition-all duration-300 border-b"
  [ngClass]="isScrolled ? 'bg-background/90 backdrop-blur-md border-border py-4' : 'bg-transparent border-transparent py-6'"
>
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
    
    <a href="#hero" class="font-logo text-2xl sm:text-3xl text-foreground hover:text-primary transition-colors tracking-widest uppercase text-shadow-glow-red">
      DJ Matias
    </a>

    <div class="hidden md:flex items-center gap-8">
      <a href="#bio" class="text-xs font-sans tracking-widest text-muted-foreground hover:text-foreground transition-colors uppercase">Bio</a>
      <a href="#music" class="text-xs font-sans tracking-widest text-muted-foreground hover:text-foreground transition-colors uppercase">Som</a>
      <a href="#experiencia" class="text-xs font-sans tracking-widest text-muted-foreground hover:text-foreground transition-colors uppercase">Giglog</a>
      <a href="#galeria" class="text-xs font-sans tracking-widest text-muted-foreground hover:text-foreground transition-colors uppercase">Galeria</a>
      <a href="#rider" class="text-xs font-sans tracking-widest text-muted-foreground hover:text-foreground transition-colors uppercase">Rider</a>
      
      <a href="#contato" class="px-6 py-2.5 bg-primary text-primary-foreground text-xs font-bold tracking-widest uppercase rounded-sm hover:opacity-90 transition-colors shadow-[0_0_10px_rgba(255,23,68,0.3)]">
        Booking
      </a>
    </div>

    <button class="md:hidden text-foreground hover:text-primary transition-colors focus:outline-none" (click)="toggleMenu()">
      <lucide-icon [img]="isMenuOpen ? XIcon : MenuIcon" class="w-7 h-7"></lucide-icon>
    </button>
  </div>

  <div 
    *ngIf="isMenuOpen"
    class="md:hidden fixed inset-0 top-[70px] bg-background/95 backdrop-blur-xl border-t border-border flex flex-col items-center justify-center gap-8 h-[calc(100vh-70px)] transition-all z-[90]"
  >
    <a href="#bio" (click)="closeMenu()" class="text-2xl font-heading tracking-widest text-muted-foreground hover:text-foreground uppercase transition-colors">Biografia</a>
    <a href="#music" (click)="closeMenu()" class="text-2xl font-heading tracking-widest text-muted-foreground hover:text-foreground uppercase transition-colors">Sonoridade</a>
    <a href="#experiencia" (click)="closeMenu()" class="text-2xl font-heading tracking-widest text-muted-foreground hover:text-foreground uppercase transition-colors">Gig Log</a>
    <a href="#galeria" (click)="closeMenu()" class="text-2xl font-heading tracking-widest text-muted-foreground hover:text-foreground uppercase transition-colors">Mídia</a>
    <a href="#rider" (click)="closeMenu()" class="text-2xl font-heading tracking-widest text-muted-foreground hover:text-foreground uppercase transition-colors">Rider Técnico</a>
    
    <a href="#contato" (click)="closeMenu()" class="mt-6 px-12 py-4 bg-primary text-primary-foreground text-sm font-bold tracking-widest uppercase rounded-sm shadow-[0_0_20px_rgba(255,23,68,0.4)]">
      Solicitar Booking
    </a>
  </div>
</nav>
