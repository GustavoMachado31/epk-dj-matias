<section id="aftermovies" class="py-24 sm:py-32 px-6 bg-[#050505] border-t border-border">
  <div class="max-w-5xl mx-auto">
    
    <div class="flex items-center gap-3 mb-4">
      <lucide-icon [img]="FilmIcon" class="w-4 h-4 text-primary animate-pulse"></lucide-icon>
      <span class="text-xs font-bold tracking-[0.25em] uppercase text-primary font-heading">
        Cinemática
      </span>
    </div>

    <h2 class="h-brutal text-4xl sm:text-5xl font-bold mb-12 text-foreground tracking-tight uppercase">
       After<span class="text-primary text-shadow-glow-red">movies</span>
    </h2>

    <div class="grid md:grid-cols-3 gap-6 sm:gap-8">
      
      <div class="group relative bg-black border border-border/50 p-2 rounded-sm hover:border-primary/50 transition-colors duration-300">
        <div class="relative w-full aspect-[9/16] bg-black overflow-hidden flex items-center justify-center border border-border/30">
          
          <iframe 
            class="absolute inset-0 w-full h-full grayscale-[0.2] group-hover:grayscale-0 transition-all duration-500" 
            src="https://www.youtube.com/embed/4YzJJgSqnyc?rel=0&modestbranding=1" 
            title="DJ Matias Aftermovie" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
          
        </div>
      </div>

      <div class="group relative bg-black border border-border/50 p-2 rounded-sm hover:border-primary/50 transition-colors duration-300">
        <div class="relative w-full aspect-[9/16] bg-black overflow-hidden flex items-center justify-center border border-border/30">
          
          <iframe 
            class="absolute inset-0 w-full h-full grayscale-[0.2] group-hover:grayscale-0 transition-all duration-500" 
            src="https://www.youtube.com/embed/eTExpFCSXHE?rel=0&modestbranding=1" 
            title="DJ Matias Aftermovie" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
          
        </div>
      </div>

      <div class="hidden md:block group relative bg-black border border-border/50 p-2 rounded-sm hover:border-primary/50 transition-colors duration-300">
        <div class="relative w-full aspect-[9/16] bg-black overflow-hidden flex items-center justify-center border border-border/30">
          
          <iframe 
            class="absolute inset-0 w-full h-full grayscale-[0.2] group-hover:grayscale-0 transition-all duration-500" 
            src="https://www.youtube.com/embed/MlzuE-px3xs?rel=0&modestbranding=1" 
            title="DJ Matias Aftermovie" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
          
        </div>
      </div>

    </div>
  </div>
</section>
