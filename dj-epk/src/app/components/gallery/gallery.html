<section id="galeria" class="py-24 sm:py-32 px-6 bg-background border-t border-border">
  <div class="max-w-5xl mx-auto">
    
    <div class="text-center mb-16">
      <div class="flex items-center justify-center gap-3 mb-4">
        <lucide-icon [img]="CameraIcon" class="w-4 h-4 text-primary"></lucide-icon>
        <span class="text-xs font-bold tracking-[0.25em] uppercase text-primary font-heading">
          A Vibe
        </span>
      </div>
      <h2 class="h-brutal text-4xl sm:text-5xl font-bold text-foreground tracking-tight">
        GALERIA DE <span class="text-primary text-shadow-glow-red">MÍDIA</span>
      </h2>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4">
      
      <button 
        *ngFor="let photo of photos" 
        (click)="openLightbox(photo)"
        class="group relative overflow-hidden rounded-sm aspect-square cursor-pointer border border-border hover:border-primary/50 transition-all focus:outline-none focus:ring-2 focus:ring-primary"
      >
        <img
          [src]="photo.url"
          [alt]="photo.alt"
          class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 md:grayscale md:contrast-125 group-hover:grayscale-0"
        />
        
        <div class="absolute inset-0 bg-gradient-to-t from-background/90 via-transparent to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
        
        <div class="absolute bottom-3 left-3 right-3 translate-y-0 opacity-100 md:translate-y-4 md:opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
          <p class="text-xs font-sans tracking-widest text-white uppercase">{{ photo.alt }}</p>
        </div>
      </button>

    </div>
  </div>

  <div 
    *ngIf="selectedPhoto" 
    class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4 sm:p-6 backdrop-blur-sm transition-opacity"
    (click)="closeLightbox()" 
  >
    <button 
      class="absolute top-6 right-6 p-2 bg-background border border-border text-muted-foreground hover:text-primary hover:border-primary/50 transition-colors z-[101]"
      (click)="closeLightbox()"
    >
      <lucide-icon [img]="XIcon" class="w-6 h-6"></lucide-icon>
    </button>

    <img
      [src]="selectedPhoto.url"
      [alt]="selectedPhoto.alt"
      class="max-w-full max-h-[90vh] object-contain border border-border/50 shadow-2xl"
      (click)="$event.stopPropagation()"
    />
  </div>

</section>
