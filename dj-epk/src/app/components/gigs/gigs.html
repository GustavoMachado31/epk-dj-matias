<section id="experiencia" class="py-24 sm:py-32 px-6 relative overflow-hidden bg-[#0A0A0A] border-t border-border">
  
  <div class="absolute inset-0 bg-cover bg-center opacity-10" style="background-image: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=1920&q=80')"></div>
  <div class="absolute inset-0 bg-gradient-to-b from-[#0A0A0A] via-[#0A0A0A]/95 to-[#0A0A0A]"></div>

  <div class="max-w-5xl mx-auto relative z-10">
    
    <div class="text-center mb-16">
      <div class="flex items-center justify-center gap-3 mb-4">
        <lucide-icon [img]="CalendarIcon" class="w-4 h-4 text-primary"></lucide-icon>
        <span class="text-xs font-bold tracking-[0.25em] uppercase text-primary font-heading">
          Experiência
        </span>
      </div>
      <h2 class="h-brutal text-4xl sm:text-5xl font-bold text-foreground tracking-tight">
        GIG <span class="text-primary text-shadow-glow-red">LOG</span>
      </h2>
    </div>

    <div class="grid lg:grid-cols-2 gap-12">
      
      <div>
        <h3 class="font-heading text-2xl font-bold mb-6 flex items-center gap-2 text-foreground tracking-wide uppercase">
          <lucide-icon [img]="MapPinIcon" class="w-5 h-5 text-primary"></lucide-icon>
          Principais Eventos
        </h3>
        
        <div class="space-y-3">
          <div *ngFor="let gig of highlights" class="flex items-center justify-between p-5 rounded-sm bg-card border border-border hover:border-primary/50 transition-colors group">
            <div>
              <span class="font-bold block text-foreground tracking-wide group-hover:text-primary transition-colors">{{ gig.event }}</span>
              <span class="text-sm text-muted-foreground font-sans">{{ gig.location }}</span>
            </div>
            <span class="text-sm text-primary font-bold tracking-widest">{{ gig.year }}</span>
          </div>
        </div>
      </div>

      <div>
        <h3 class="font-heading text-2xl font-bold mb-6 flex items-center gap-2 text-foreground tracking-wide uppercase">
          <lucide-icon [img]="UsersIcon" class="w-5 h-5 text-primary"></lucide-icon>
          Suporte para
        </h3>
        
        <div class="p-8 rounded-sm bg-gradient-to-br from-primary/10 to-primary/5 border border-primary/20 hover:border-primary/40 transition-colors">
          <p class="text-sm text-muted-foreground mb-6 font-sans">
            Line-ups compartilhados com artistas de renome na cena.
          </p>
          <div class="flex flex-wrap gap-2">
            <span *ngFor="let artist of supports" class="px-5 py-2 rounded-sm bg-primary/20 text-foreground text-sm font-bold tracking-wide border border-primary/30">
              {{ artist }}
            </span>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mt-6">
          <div *ngFor="let stat of stats" class="text-center p-6 rounded-sm bg-card border border-border hover:border-primary/30 transition-colors">
            <span class="font-heading text-3xl font-bold text-primary block mb-1">
              {{ stat.value }}
            </span>
            <span class="text-xs font-sans text-muted-foreground uppercase tracking-widest">{{ stat.label }}</span>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>
